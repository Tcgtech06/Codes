[build]
  command = "npm ci && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20.19.0"
  NODE_ENV = "production"
  SECRETS_SCAN_ENABLED = "false"

# Essential Next.js configuration for Netlify
[[plugins]]
  package = "@netlify/plugin-nextjs"

# No custom redirects needed - let the plugin handle everything
