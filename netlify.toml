[build]
  command = "npm ci && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20.19.0"
  NPM_FLAGS = "--production=false"
  NEXT_PUBLIC_API_URL = "/api/v1"
  NODE_ENV = "production"
  SECRETS_SCAN_ENABLED = "false"

# Handle API routes
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Handle client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
