[build]
  command = "npm ci && npm run build"
  publish = ".next/static"

[build.environment]
  NODE_VERSION = "20.19.0"
  NPM_FLAGS = "--production=false"
  NODE_ENV = "production"
  SECRETS_SCAN_ENABLED = "false"

# Handle Next.js routing
[[redirects]]
  from = "/_next/static/*"
  to = "/static/:splat"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/nextjs"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
